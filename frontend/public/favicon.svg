<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" ry="96" fill="none" stroke="#30363d" stroke-width="4"/>

  <!-- Subtle grid pattern for tech feel -->
  <g opacity="0.06" stroke="#58a6ff" stroke-width="1">
    <line x1="128" y1="64" x2="128" y2="448"/>
    <line x1="256" y1="64" x2="256" y2="448"/>
    <line x1="384" y1="64" x2="384" y2="448"/>
    <line x1="64" y1="128" x2="448" y2="128"/>
    <line x1="64" y1="256" x2="448" y2="256"/>
    <line x1="64" y1="384" x2="448" y2="384"/>
  </g>

  <!-- Input arrows (left side) - representing incoming requests -->
  <g filter="url(#softglow)">
    <!-- Top input line -->
    <line x1="96" y1="160" x2="200" y2="230" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
    <!-- Middle input line -->
    <line x1="80" y1="256" x2="200" y2="256" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <!-- Bottom input line -->
    <line x1="96" y1="352" x2="200" y2="282" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Central proxy node - the diamond/hexagonal hub -->
  <g filter="url(#softglow)">
    <polygon points="256,180 320,256 256,332 192,256" fill="url(#glow)" stroke="url(#accent)" stroke-width="6"/>
    <!-- Inner diamond -->
    <polygon points="256,210 290,256 256,302 222,256" fill="none" stroke="#58a6ff" stroke-width="3" opacity="0.7"/>
    <!-- Center dot -->
    <circle cx="256" cy="256" r="12" fill="#58a6ff"/>
    <circle cx="256" cy="256" r="6" fill="#e6edf3"/>
  </g>

  <!-- Output arrows (right side) - representing proxied requests -->
  <g filter="url(#softglow)">
    <!-- Top output line -->
    <line x1="312" y1="230" x2="416" y2="160" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
    <!-- Middle output line -->
    <line x1="312" y1="256" x2="432" y2="256" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <!-- Bottom output line -->
    <line x1="312" y1="282" x2="416" y2="352" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" opacity="0.8"/>

    <!-- Arrow tips on output lines -->
    <polygon points="416,152 416,168 432,160" fill="#58a6ff" opacity="0.8"/>
    <polygon points="432,248 432,264 448,256" fill="#58a6ff" opacity="0.9"/>
    <polygon points="416,344 416,360 432,352" fill="#58a6ff" opacity="0.8"/>
  </g>

  <!-- Small endpoint dots -->
  <g>
    <circle cx="96" cy="160" r="8" fill="#58a6ff" opacity="0.6"/>
    <circle cx="80" cy="256" r="8" fill="#58a6ff" opacity="0.7"/>
    <circle cx="96" cy="352" r="8" fill="#58a6ff" opacity="0.6"/>
  </g>

  <!-- "AI" text at the bottom -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#58a6ff" letter-spacing="8" opacity="0.85">AI PROXY</text>
</svg>
