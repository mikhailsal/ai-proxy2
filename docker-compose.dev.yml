# Development overrides — hot reload, exposed ports, no Traefik
services:
  traefik:
    profiles:
      - production

  postgres:
    ports:
      - "127.0.0.1:5433:5432"

  migrate:
    build:
      context: ./backend
      target: deps
    volumes:
      - ./backend/ai_proxy:/app/ai_proxy
      - ./backend/migrations:/app/migrations
      - ./backend/alembic.ini:/app/alembic.ini:ro

  backend:
    build:
      context: ./backend
      target: deps
    command: ["uvicorn", "ai_proxy.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/ai_proxy:/app/ai_proxy
      - ./backend/tests:/app/tests
      - ./backend/migrations:/app/migrations
      - ./backend/alembic.ini:/app/alembic.ini:ro
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./config.yml:/app/config.yml:ro
      - ./config.secrets.yml:/app/config.secrets.yml:ro
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ai_proxy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_proxy}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OMNIROUTE_API_KEY=${OMNIROUTE_API_KEY}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - WATCHFILES_FORCE_POLLING=true
    networks:
      - default
      - omniroute-network
    labels: []

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
    environment:
      - VITE_API_TARGET=http://backend:8000
    labels: []

networks:
  omniroute-network:
    external: true
    name: omniroute_default
