# ── AI Proxy v2 — Secrets ────────────────────────────────────────────
# Copy this file to config.secrets.yml and fill in your real values.
# config.secrets.yml is gitignored and MUST NOT be committed.

# Proxy access keys (optional)
# Comma-separated list of API keys that clients use to authenticate
# with the proxy itself. Leave empty or omit to allow anonymous access.
# These replace the API_KEYS environment variable.
api_keys:
  - "your-proxy-access-key-1"
  - "your-proxy-access-key-2"

# UI dashboard key (optional)
# Key required to access the /ui/* endpoints.
# Replaces the UI_API_KEY environment variable.
ui_api_key: "your-ui-dashboard-key"

# Key mappings (optional)
# Map client proxy keys to per-provider upstream API keys.
# Client keys are written in plaintext here — the proxy hashes them
# automatically at load time, so you never need to run sha256 manually.
#
# key_mappings:
#   "your-proxy-access-key-1":
#     provider_keys:
#       openrouter: "sk-or-v1-your-openrouter-key"
#       anthropic: "sk-ant-your-anthropic-key"
#   "your-proxy-access-key-2":
#     provider_keys:
#       openrouter: "sk-or-v1-another-openrouter-key"
