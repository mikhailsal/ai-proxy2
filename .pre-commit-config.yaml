repos:
  # ── General ─────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^frontend/
      - id: end-of-file-fixer
        exclude: ^frontend/
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict

  # ── Python (Backend) ────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^backend/ai_proxy/
        additional_dependencies:
          - fastapi>=0.115.0
          - pydantic>=2.10.0
          - pydantic-settings>=2.7.0
          - httpx>=0.28.0
          - sqlalchemy>=2.0.36
          - structlog>=24.4.0
          - types-pyyaml>=6.0.12

  # ── Frontend (ESLint) ───────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        types: [file]
        pass_filenames: false
      - id: code-limits
        name: code limits
        entry: python scripts/check_code_limits.py
        language: system
        pass_filenames: false
      - id: backend-coverage
        name: backend coverage >= 95
        entry: bash -c 'cd backend && if [ -x .venv/bin/python ]; then source .venv/bin/activate; fi && python -m pytest tests --cov=ai_proxy --cov-report=term-missing'
        language: system
        pass_filenames: false
        always_run: true
      - id: frontend-coverage
        name: frontend coverage >= 95
        entry: bash -c 'cd frontend && npm run test:coverage'
        language: system
        pass_filenames: false
        always_run: true
