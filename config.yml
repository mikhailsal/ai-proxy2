# ── Bypass mode ─────────────────────────────────────────────────────
# When enabled, clients who are NOT in the api_keys list can still use
# the proxy by sending their own provider API key directly.
# Their key is forwarded as-is to the upstream provider.
#
# Configured (known) keys ALWAYS take priority — if a client sends a
# key that matches api_keys, the proxy uses key_mappings to resolve
# the upstream key, regardless of whether bypass is on or off.
#
# Set to false to reject all unknown keys (only api_keys are accepted).
bypass:
  enabled: true

# ── Secrets ─────────────────────────────────────────────────────────
# Key mappings, API keys, and UI key are stored in config.secrets.yml
# (see config.secrets.example.yml for the template).
# That file is gitignored and MUST NOT be committed.

# Access rules (optional)
access_rules: {}

# Request modification rules (optional)
modification_rules: []

# Logging settings
logging:
  log_retention_days: 30
  batch_size: 50
  flush_interval_seconds: 5

# Grouping rules for conversation detection
grouping:
  default_field: "system_prompt"
