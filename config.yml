# ── AI Proxy v2 Configuration ──────────────────────────────────────────
# Copy this file to config.yml and customize.

# Provider definitions
providers:
  openrouter:
    type: openai_compatible
    endpoint: https://openrouter.ai/api/v1
    # API key is read from OPENROUTER_API_KEY env var
    headers:
      HTTP-Referer: "https://ai-proxy.example.com"
      X-Title: "AI Proxy v2"

# Model mappings: client-facing model name -> provider:actual_model
# Explicit entries are visible in /v1/models. The "*" wildcard is a fallback.
model_mappings:
  # ── Whitelist: models tested in ai-bench/current-date-bench ──
  # OpenAI
  "openai/gpt-5.1-codex-mini": "openrouter:openai/gpt-5.1-codex-mini"
  "openai/gpt-oss-120b": "openrouter:openai/gpt-oss-120b"
  "openai/gpt-oss-20b": "openrouter:openai/gpt-oss-20b"
  # Anthropic
  "anthropic/claude-sonnet-4.6": "openrouter:anthropic/claude-sonnet-4.6"
  "anthropic/claude-opus-4.5": "openrouter:anthropic/claude-opus-4.5"
  "anthropic/claude-opus-4.6": "openrouter:anthropic/claude-opus-4.6"
  # Google
  "google/gemini-2.5-flash-lite": "openrouter:google/gemini-2.5-flash-lite"
  "google/gemini-2.5-flash": "openrouter:google/gemini-2.5-flash"
  "google/gemini-3-flash-preview": "openrouter:google/gemini-3-flash-preview"
  "google/gemini-3-pro-preview": "openrouter:google/gemini-3-pro-preview"
  "google/gemini-3.1-pro-preview": "openrouter:google/gemini-3.1-pro-preview"
  # Meta
  "meta-llama/llama-4-scout": "openrouter:meta-llama/llama-4-scout"
  # Qwen
  "qwen/qwen3-8b": "openrouter:qwen/qwen3-8b"
  "qwen/qwen3-coder": "openrouter:qwen/qwen3-coder"
  "qwen/qwen3-coder-next": "openrouter:qwen/qwen3-coder-next"
  "qwen/qwen3.5-flash-02-23": "openrouter:qwen/qwen3.5-flash-02-23"
  # Mistral
  "mistralai/mistral-small-3.2-24b-instruct": "openrouter:mistralai/mistral-small-3.2-24b-instruct"
  "mistralai/mistral-small-2603": "openrouter:mistralai/mistral-small-2603"
  # Z-AI
  "z-ai/glm-5": "openrouter:z-ai/glm-5"
  "z-ai/glm-5-turbo": "openrouter:z-ai/glm-5-turbo"
  # Moonshot
  "moonshotai/kimi-k2.5": "openrouter:moonshotai/kimi-k2.5"
  # DeepSeek
  "deepseek/deepseek-v3.2": "openrouter:deepseek/deepseek-v3.2"
  "deepseek/deepseek-v3.2-exp": "openrouter:deepseek/deepseek-v3.2-exp"
  "nex-agi/deepseek-v3.1-nex-n1": "openrouter:nex-agi/deepseek-v3.1-nex-n1"
  "tngtech/deepseek-r1t2-chimera": "openrouter:tngtech/deepseek-r1t2-chimera"
  # X-AI
  "x-ai/grok-4.20-beta": "openrouter:x-ai/grok-4.20-beta"
  # MiniMax
  "minimax/minimax-m2.7": "openrouter:minimax/minimax-m2.7"
  # StepFun
  "stepfun/step-3.5-flash:free": "openrouter:stepfun/step-3.5-flash:free"
  # Arcee
  "arcee-ai/trinity-large-preview:free": "openrouter:arcee-ai/trinity-large-preview:free"
  # Xiaomi
  "xiaomi/mimo-v2-flash": "openrouter:xiaomi/mimo-v2-flash"
  # ── Extra: memcomp-bench models not in the list above ──
  "x-ai/grok-4.1-fast": "openrouter:x-ai/grok-4.1-fast"
  "google/gemini-3.1-flash-lite-preview": "openrouter:google/gemini-3.1-flash-lite-preview"
  # ── Fallback: unmapped models → free route ──
  "*": "openrouter:openrouter/free"

# Bypass mode (optional)
# When enabled, the client's own API key is forwarded to the upstream provider.
# No preconfigured API_KEYS are required — any non-empty key is accepted.
bypass:
  enabled: true

# Key mappings, API keys, and UI key are stored in config.secrets.yml
# (see config.secrets.example.yml for the template).

# Access rules (optional)
access_rules: {}

# Request modification rules (optional)
modification_rules: []

# Logging settings
logging:
  log_retention_days: 30
  batch_size: 50
  flush_interval_seconds: 5

# Grouping rules for conversation detection
grouping:
  default_field: "system_prompt"
